<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>入試順位推定</title>
<meta name="description" content="受験者データから自分の順位・偏差値を正規分布で推定するツール">
<meta property="og:type" content="website">
<meta property="og:url" content="https://exam-ranking-estimation.vercel.app/">
<meta property="og:title" content="入試順位推定">
<meta property="og:description" content="受験者データから自分の順位・偏差値を正規分布で推定するツール">
<meta property="og:image" content="https://exam-ranking-estimation.vercel.app/ogp.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="入試順位推定">
<meta name="twitter:description" content="受験者データから自分の順位・偏差値を正規分布で推定するツール">
<meta name="twitter:image" content="https://exam-ranking-estimation.vercel.app/ogp.jpg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#111318;min-height:100%;}
.app{background:#111318;border-radius:0;padding:28px 24px 32px;font-family:var(--font-sans);max-width:900px;margin:0 auto;}
.app-title{font-size:18px;font-weight:500;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;display:flex;align-items:center;gap:10px;letter-spacing:.04em;}
.app-title i{-webkit-text-fill-color:#a78bfa;font-size:20px;}
.preset-row{display:flex;gap:8px;margin-bottom:18px;}
.cyber-select{flex:1;background:linear-gradient(180deg,#1e2030 0%,#161820 100%);border:1px solid #3b3f6a;border-radius:10px;color:#c4c9f0;padding:10px 12px;font-size:13px;outline:none;}
.cyber-select:focus{border-color:#7c6df0;}
.cyber-btn{padding:0 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;background:linear-gradient(135deg,#3730a3,#6d28d9);border:1px solid #7c6df0;color:#e0d9ff;transition:opacity .15s,transform .1s;white-space:nowrap;}
.cyber-btn:hover{opacity:.85;}
.cyber-btn:active{transform:scale(.97);}
.input-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.field label{display:block;font-size:11px;color:#6b7280;margin-bottom:6px;letter-spacing:.05em;}
.cyber-input{width:100%;background:linear-gradient(180deg,rgba(99,102,241,.08) 0%,rgba(30,32,48,.6) 60%);border:1px solid #374151;border-radius:10px;color:#e2e8f0;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s,box-shadow .2s;}
.cyber-input:focus{border-color:#818cf8;box-shadow:0 0 0 2px rgba(129,140,248,.18);}
.cyber-input::placeholder{color:#374151;}
.calc-btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e3a5f 100%);border:1px solid #6366f1;color:#c7d2fe;letter-spacing:.06em;transition:opacity .15s;margin-bottom:22px;position:relative;overflow:hidden;}
.calc-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(167,139,250,.1),transparent);transform:translateX(-100%);transition:transform .4s;}
.calc-btn:hover::before{transform:translateX(100%);}
.calc-btn:hover{opacity:.9;}
.section-label{font-size:11px;letter-spacing:.08em;color:#4b5563;margin-bottom:10px;text-transform:uppercase;}
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.cyber-card{background:linear-gradient(160deg,rgba(99,102,241,.1) 0%,rgba(17,19,24,.8) 100%);border:1px solid #1f2440;border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;}
.cyber-card.accent{border-color:#4338ca;box-shadow:0 0 12px rgba(99,102,241,.15);}
.cyber-card .clabel{font-size:11px;color:#6b7280;margin-bottom:6px;position:relative;z-index:2;}
.cyber-card .cvalue{font-size:20px;font-weight:500;color:#e2e8f0;position:relative;z-index:2;}
.cyber-card .csub{font-size:11px;color:#4b5563;margin-top:3px;position:relative;z-index:2;}
.cyber-card.accent .cvalue{color:#a5b4fc;}
.card-silver{background:linear-gradient(160deg,#2a2f3a 0%,#1a1e28 50%,#232830 100%) !important;border:1px solid #8899aa !important;box-shadow:0 0 18px rgba(180,200,220,.25),inset 0 1px 0 rgba(255,255,255,.18),inset 0 -1px 0 rgba(0,0,0,.4) !important;}
.card-silver .cvalue{background:linear-gradient(135deg,#d0dae8 10%,#f4f8ff 35%,#8fa8c0 55%,#f0f6ff 75%,#9ab0c8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-silver .clabel{color:#7a9ab8 !important;}
.card-silver .csub{color:#5a7a98 !important;}
.card-silver::before{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:sheen 2.8s ease-in-out infinite;z-index:1;}
.card-gold{background:linear-gradient(160deg,#2a2410 0%,#1e1a08 50%,#28220e 100%) !important;border:1px solid #c8960a !important;box-shadow:0 0 24px rgba(230,180,20,.3),inset 0 1px 0 rgba(255,230,100,.25),inset 0 -1px 0 rgba(0,0,0,.5) !important;}
.card-gold .cvalue{background:linear-gradient(135deg,#c8860a 5%,#ffe87a 30%,#f5c518 50%,#fff2a0 68%,#c8920c 85%,#ffd740 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-gold .clabel{color:#c8a84a !important;}
.card-gold .csub{color:#9a7820 !important;}
.card-gold::before{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,220,80,.18),transparent);animation:sheen 2.2s ease-in-out infinite;z-index:1;}
.card-rainbow{background:linear-gradient(160deg,#1a0e28 0%,#0e1428 50%,#0e2018 100%) !important;border:1.5px solid transparent !important;box-shadow:0 0 28px rgba(168,85,247,.35),0 0 50px rgba(59,130,246,.2) !important;}
.card-rainbow::after{content:'';position:absolute;inset:-2px;border-radius:12px;background:linear-gradient(var(--rangle,0deg),#ff6eb4,#a855f7,#6366f1,#38bdf8,#34d399,#facc15,#fb923c,#ff6eb4);z-index:0;animation:spin 2.5s linear infinite;}
.card-rainbow .inner-bg{position:absolute;inset:1.5px;background:linear-gradient(160deg,#1a0e28 0%,#0e1428 50%,#0e2018 100%);border-radius:9px;z-index:1;}
.card-rainbow .cvalue{background:linear-gradient(90deg,#ff9de2,#c084fc,#818cf8,#38bdf8,#34d399,#facc15,#fb923c,#ff9de2);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbow-text 2s linear infinite;}
.card-rainbow .clabel{color:#c084fc !important;}
.card-rainbow .csub{color:#818cf8 !important;}
.card-rainbow::before{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);animation:sheen 1.8s ease-in-out infinite;z-index:3;}
@keyframes sheen{0%{left:-60%}60%{left:120%}100%{left:120%}}
@keyframes spin{from{--rangle:0deg}to{--rangle:360deg}}
@keyframes rainbow-text{0%{background-position:0% center}100%{background-position:200% center}}
.divider{height:1px;background:linear-gradient(90deg,transparent,#2d3560,transparent);margin:20px 0;}
#chartWrap{position:relative;width:100%;height:250px;}
.legend{display:flex;gap:16px;font-size:12px;color:#4b5563;margin-top:10px;flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:2px;}
.hidden{display:none;}
.x-post-btn{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;background:#000;border:1px solid #333;color:#fff;transition:opacity .15s;}
.x-post-btn:hover{opacity:.8;}
@media(max-width:600px){
  .app{padding:16px 12px 28px;}
  .input-row{grid-template-columns:1fr 1fr;}
  .input-row .field:nth-child(5){grid-column:1/-1;}
  .cyber-input{font-size:16px;padding:12px;}
  .field label{font-size:12px;}
  .preset-row{flex-direction:column;}
  .cyber-btn{padding:12px;width:100%;}
  .cyber-select{font-size:15px;padding:12px;}
  .cards-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .cyber-card{padding:14px 12px;}
  .cyber-card .clabel{font-size:12px;}
  .cyber-card .cvalue{font-size:22px;}
  .cyber-card .csub{font-size:11px;}
  .calc-btn{font-size:16px;padding:16px;}
  #chartWrap{height:200px;}
  .legend{gap:8px;font-size:12px;}
  .x-post-btn{width:100%;padding:14px;font-size:15px;}
}
  .input-row{grid-template-columns:repeat(2,1fr);}
  .input-row .field:last-child{grid-column:1/-1;}
  .cards-grid{grid-template-columns:repeat(2,1fr);}
  .cyber-card .cvalue{font-size:17px;}
  .cyber-card .csub{font-size:10px;}
  #chartWrap{height:220px;}
  .legend{gap:10px;font-size:11px;}
}
</style>
</head>
<body>
<div class="app">
  <h2 style="color:#ffffff;font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:.04em;">大学入試順位推定ツール</h2>
  <div class="app-title">
    <i class="ti ti-chart-bell-curve" aria-hidden="true"></i>
    大学入試 / 順位推定
  </div>
  <div class="preset-row">
    <select class="cyber-select" id="preset" onchange="onPresetChange()">
      <option value="__custom">✏️ 手入力する</option>
      <option value="">大学・学部を選択</option>
      <optgroup label="東京大学">
        <option value="todai_l1">文科一類</option>
        <option value="todai_l2">文科二類</option>
        <option value="todai_l3">文科三類</option>
        <option value="todai_s1">理科一類</option>
        <option value="todai_s2">理科二類</option>
        <option value="todai_s3">理科三類</option>
      </optgroup>
      <optgroup label="京都大学">
        <option value="kyodai_soujin_l">総合人間（文系）</option>
        <option value="kyodai_soujin_s">総合人間（理系）</option>
        <option value="kyodai_lit">文学部</option>
        <option value="kyodai_edu_l">教育（文系）</option>
        <option value="kyodai_edu_s">教育（理系）</option>
        <option value="kyodai_law">法学部</option>
        <option value="kyodai_eco_l">経済（文系）</option>
        <option value="kyodai_eco_s">経済（理系）</option>
        <option value="kyodai_sci">理学部</option>
        <option value="kyodai_igakuka">医学部</option>
        <option value="kyodai_jinken">人間健康科学</option>
        <option value="kyodai_med">薬学部</option>
      </optgroup>
    </select>
    <button class="cyber-btn" onclick="applyPreset()">適用</button>
  </div>
  <div id="customNameRow" class="hidden" style="margin-bottom:18px;">
    <div class="field"><label>大学・学部名</label><input class="cyber-input" type="text" id="custom_name" placeholder="例: ○○大学 △△学部"></div>
  </div>
  <div class="input-row">
    <div class="field"><label>受験者数</label><input class="cyber-input" type="number" id="juken_num" placeholder="例: 2522"></div>
    <div class="field"><label>合格者数</label><input class="cyber-input" type="number" id="goukaku_num" placeholder="例: 1121"></div>
    <div class="field"><label>合格者平均点</label><input class="cyber-input" type="number" id="passed_average_point" placeholder="例: 332.1"></div>
    <div class="field"><label>合格最低点</label><input class="cyber-input" type="number" id="min_point" placeholder="例: 303.4"></div>
    <div class="field"><label>自分の点数</label><input class="cyber-input" type="number" id="my_score" placeholder="点数を入力"></div>
  </div>
  <button class="calc-btn" onclick="calculate()">
    <i class="ti ti-cpu" aria-hidden="true" style="margin-right:6px;font-size:15px;vertical-align:-2px;"></i>
    順位を計算する
  </button>
  <div id="resultSection" class="hidden">
    <p class="section-label">分布パラメータ</p>
    <div class="cards-grid">
      <div class="cyber-card"><div class="clabel">倍率</div><div class="cvalue" id="r-bairitsu">—</div></div>
      <div class="cyber-card"><div class="clabel">受験者平均点</div><div class="cvalue" id="r-avg">—</div></div>
      <div class="cyber-card"><div class="clabel">受験者標準偏差</div><div class="cvalue" id="r-sd">—</div></div>
      <div class="cyber-card"><div class="clabel">合格者標準偏差</div><div class="cvalue" id="r-psd">—</div></div>
    </div>
    <p class="section-label">あなたの結果</p>
    <div class="cards-grid">
      <div class="cyber-card" id="card-overall">
        <div class="inner-bg" id="card-overall-bg" style="display:none"></div>
        <div class="clabel">全体順位</div>
        <div class="cvalue" id="r-overall-rank">—</div>
        <div class="csub" id="r-overall-pct">—</div>
      </div>
      <div class="cyber-card" id="card-inside">
        <div class="inner-bg" id="card-inside-bg" style="display:none"></div>
        <div class="clabel" id="r-inside-label">合格者内順位</div>
        <div class="cvalue" id="r-inside-rank">—</div>
        <div class="csub" id="r-inside-pct">—</div>
      </div>
      <div class="cyber-card" id="card-hensachi-overall">
        <div class="inner-bg" id="card-ho-bg" style="display:none"></div>
        <div class="clabel">全体偏差値</div>
        <div class="cvalue" id="r-hensachi-overall">—</div>
      </div>
      <div class="cyber-card" id="card-hensachi-inside">
        <div class="inner-bg" id="card-hi-bg" style="display:none"></div>
        <div class="clabel" id="r-hensachi-label">合格者内偏差値</div>
        <div class="cvalue" id="r-hensachi-inside">—</div>
      </div>
    </div>
    <div class="divider"></div>
    <p class="section-label">得点分布と自分の位置</p>
    <div id="chartWrap">
      <canvas id="distChart" role="img" aria-label="受験者の得点分布と自分の位置を示す正規分布曲線"></canvas>
    </div>
    <div class="legend" id="chartLegend"></div>
    <div style="margin-top:18px;text-align:right;">
      <button class="x-post-btn" id="xPostBtn" onclick="postToX()"><span style="font-size:14px;font-weight:700;margin-right:5px;">𝕏</span>ポストする</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const presets={
  todai_l1:{juken_num:985,goukaku_num:403,passed_average_point:352.7684,min_point:325.0100},
  todai_l2:{juken_num:875,goukaku_num:355,passed_average_point:353.9396,min_point:330.4700},
  todai_l3:{juken_num:1161,goukaku_num:470,passed_average_point:339.1589,min_point:316.3200},
  todai_s1:{juken_num:2522,goukaku_num:1121,passed_average_point:332.1105,min_point:303.3900},
  todai_s2:{juken_num:1572,goukaku_num:542,passed_average_point:326.4965,min_point:305.0000},
  todai_s3:{juken_num:266,goukaku_num:99,passed_average_point:377.7881,min_point:346.0900},
  kyodai_soujin_l:{juken_num:213,goukaku_num:64,passed_average_point:564.20,min_point:530.50},
  kyodai_soujin_s:{juken_num:182,goukaku_num:54,passed_average_point:500.71,min_point:454.00},
  kyodai_lit:{juken_num:656,goukaku_num:214,passed_average_point:518.97,min_point:488.25},
  kyodai_edu_l:{juken_num:162,goukaku_num:47,passed_average_point:598.22,min_point:564.66},
  kyodai_edu_s:{juken_num:34,goukaku_num:11,passed_average_point:565.42,min_point:523.18},
  kyodai_law:{juken_num:807,goukaku_num:316,passed_average_point:601.63,min_point:558.08},
  kyodai_eco_l:{juken_num:532,goukaku_num:202,passed_average_point:594.27,min_point:555.75},
  kyodai_eco_s:{juken_num:103,goukaku_num:27,passed_average_point:603.06,min_point:555.62},
  kyodai_sci:{juken_num:792,goukaku_num:277,passed_average_point:800.41,min_point:730.25},
  kyodai_igakuka:{juken_num:251,goukaku_num:105,passed_average_point:940.75,min_point:876.62},
  kyodai_jinken:{juken_num:226,goukaku_num:78,passed_average_point:561.91,min_point:518.50},
  kyodai_med:{juken_num:223,goukaku_num:81,passed_average_point:566.09,min_point:512.06}
};
function onPresetChange(){
  const v=document.getElementById('preset').value;
  document.getElementById('customNameRow').classList.toggle('hidden', v!=='__custom');
}
function applyPreset(){
  const v=document.getElementById('preset').value;
  if(v==='__custom')return;
  if(v&&presets[v]){const d=presets[v];document.getElementById('juken_num').value=d.juken_num;document.getElementById('goukaku_num').value=d.goukaku_num;document.getElementById('passed_average_point').value=d.passed_average_point;document.getElementById('min_point').value=d.min_point;}
}
function getSchoolName(){
  const v=document.getElementById('preset').value;
  if(v==='__custom') return document.getElementById('custom_name').value||'受験';
  const sel=document.getElementById('preset');
  const opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.value) return '受験';
  const grp=opt.parentElement;
  return (grp&&grp.label?grp.label+' ':'')+opt.text;
}
function postToX(){
  const school=getSchoolName();
  const score=document.getElementById('my_score').value||'?';
  const rank=document.getElementById('r-overall-rank').textContent||'?';
  const hensachi=document.getElementById('r-hensachi-overall').textContent||'?';
  const url='https://exam-ranking-estimation.vercel.app/';
  const text=`私の点数は${score}点で${school}内${rank}で偏差値${hensachi}でした ${url}`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
}
function erf(x){const sign=x>=0?1:-1;x=Math.abs(x);const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const t=1/(1+p*x);return sign*(1-(((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t)*Math.exp(-x*x));}
function nCDF(x){return 0.5*(1+erf(x/Math.sqrt(2)));}
function nPDF(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}
function invNorm(p){let lo=-10,hi=10;while(hi-lo>1e-6){let m=(lo+hi)/2;nCDF(m)<p?lo=m:hi=m;}return(lo+hi)/2;}

function rankTier(pct){
  if(pct<=3) return 'rainbow';
  if(pct<=10) return 'gold';
  if(pct<=30) return 'silver';
  return 'normal';
}
function hensachiTier(h){
  if(h>=70) return 'rainbow';
  if(h>=62.5) return 'gold';
  if(h>=55) return 'silver';
  return 'normal';
}
function applyCardStyle(cardId,bgId,tier){
  const card=document.getElementById(cardId);
  const bg=bgId?document.getElementById(bgId):null;
  card.classList.remove('accent','card-silver','card-gold','card-rainbow');
  if(bg)bg.style.display='none';
  if(tier==='rainbow'){card.classList.add('card-rainbow');if(bg)bg.style.display='block';}
  else if(tier==='gold'){card.classList.add('card-gold');}
  else if(tier==='silver'){card.classList.add('card-silver');}
  else{card.classList.add('accent');}
}

let chartInst=null;
function calculate(){
  const jn=+document.getElementById('juken_num').value;
  const gn=+document.getElementById('goukaku_num').value;
  const pap=+document.getElementById('passed_average_point').value;
  const mp=+document.getElementById('min_point').value;
  const ms=+document.getElementById('my_score').value;
  if(!jn||!gn||!pap||!mp||!ms)return;

  const bairitsu=jn/gn;
  const p=(bairitsu-1)/bairitsu;
  const z=invNorm(p);
  const lambda=nPDF(z)/(1-nCDF(z));
  const sd=(pap-mp)/(lambda-z);
  const avg=mp-sd*z;
  const passedSD=sd*Math.sqrt(1+z*lambda-lambda*lambda);
  const failedLambda=nPDF(z)/nCDF(z);
  const failedAvg=avg-sd*failedLambda;
  const failedSD=sd*Math.sqrt(1-z*failedLambda-failedLambda*failedLambda);
  const my_z=(ms-avg)/sd;

  const overallTopPct=(1-nCDF(my_z))*100;
  const overallRank=Math.max(1, jn*(1-nCDF(my_z)));
  const isPassing=ms>=mp;
  let insidePct,insideRank,catHensachi;
  if(isPassing){
    insidePct=((1-nCDF(my_z))/(1-nCDF(z)))*100;
    insideRank=Math.max(1, gn*(1-nCDF(my_z))/(1-nCDF(z)));
    catHensachi=50+10*(ms-pap)/passedSD;
  } else {
    insidePct=(1-nCDF(my_z)/nCDF(z))*100;
    insideRank=Math.max(1, (jn-gn)*(1-nCDF(my_z)/nCDF(z)));
    catHensachi=50+10*(ms-failedAvg)/failedSD;
  }
  const overallH=50+10*(ms-avg)/sd;
  const cat=isPassing?'合格者':'不合格者';

  document.getElementById('r-bairitsu').textContent=bairitsu.toFixed(2)+'倍';
  document.getElementById('r-avg').textContent=avg.toFixed(1)+'点';
  document.getElementById('r-sd').textContent=sd.toFixed(1)+'点';
  document.getElementById('r-psd').textContent=passedSD.toFixed(1)+'点';
  document.getElementById('r-overall-rank').textContent=Math.ceil(overallRank)+'位';
  document.getElementById('r-overall-pct').textContent='上位 '+overallTopPct.toFixed(1)+'% / '+jn+'人中';
  document.getElementById('r-inside-label').textContent=cat+'内順位';
  document.getElementById('r-inside-rank').textContent=Math.ceil(insideRank)+'位';
  document.getElementById('r-inside-pct').textContent='上位 '+insidePct.toFixed(1)+'%';
  document.getElementById('r-hensachi-overall').textContent=overallH.toFixed(1);
  document.getElementById('r-hensachi-label').textContent=cat+'内偏差値';
  document.getElementById('r-hensachi-inside').textContent=catHensachi.toFixed(1);

  applyCardStyle('card-overall','card-overall-bg', rankTier(overallTopPct));
  applyCardStyle('card-inside','card-inside-bg', rankTier(insidePct));
  applyCardStyle('card-hensachi-overall','card-ho-bg', hensachiTier(overallH));
  applyCardStyle('card-hensachi-inside','card-hi-bg', hensachiTier(catHensachi));

  document.getElementById('resultSection').classList.remove('hidden');
  drawChart(avg,sd,ms,mp,jn,pap);
}
function drawChart(avg,sd,ms,minPt,n,pap){
  const xMin=avg-3.5*sd,xMax=avg+3.5*sd,steps=200,dx=(xMax-xMin)/steps;
  const allD=[],passD=[],failD=[];
  for(let i=0;i<=steps;i++){const x=xMin+i*dx,y=nPDF((x-avg)/sd)/sd;allD.push({x,y});if(x>=minPt){passD.push({x,y});failD.push({x,y:0});}else{passD.push({x,y:0});failD.push({x,y});}}
  const myY=nPDF((ms-avg)/sd)/sd;
  const minY=nPDF((minPt-avg)/sd)/sd;
  const papY=nPDF((pap-avg)/sd)/sd;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const canvasEl=document.getElementById('distChart');
  const ctx=canvasEl.getContext('2d');

  // 特殊ラベル（afterDrawで描画）
  const specialTicks=[
    {val:minPt, lines:['最低点',minPt.toFixed(1)+'点'], color:'#f87171'},
    {val:pap,   lines:['合格平均',pap.toFixed(1)+'点'],  color:'#4ade80'},
    {val:ms,    lines:['自分',ms.toFixed(1)+'点'],        color:'#818cf8'}
  ];

  const labelPlugin={
    id:'specialLabels',
    afterDraw(chart){
      const xScale=chart.scales.x;
      const yBottom=xScale.bottom;
      const c=chart.ctx;
      c.save();
      c.textAlign='center';
      c.textBaseline='top';
      specialTicks.forEach(st=>{
        const px=xScale.getPixelForValue(st.val);
        // 目盛り線
        c.strokeStyle=st.color;
        c.lineWidth=1;
        c.setLineDash([3,3]);
        c.beginPath();c.moveTo(px,yBottom);c.lineTo(px,yBottom+4);c.stroke();
        c.setLineDash([]);
        // 2行テキスト
        c.font='600 10px sans-serif';
        c.fillStyle=st.color;
        st.lines.forEach((line,i)=>c.fillText(line,px,yBottom+6+i*13));
      });
      c.restore();
    }
  };

  chartInst=new Chart(ctx,{type:'line',
    data:{datasets:[
      {label:'不合格者',data:failD,borderColor:'transparent',backgroundColor:'rgba(255,80,60,0.45)',fill:true,pointRadius:0,tension:.4,parsing:false},
      {label:'合格者',data:passD,borderColor:'transparent',backgroundColor:'rgba(60,230,140,0.4)',fill:true,pointRadius:0,tension:.4,parsing:false},
      {label:'全体分布',data:allD,borderColor:'rgba(148,163,184,.5)',backgroundColor:'transparent',fill:false,pointRadius:0,borderWidth:1.5,tension:.4,parsing:false},
      {label:'自分の点数',data:[{x:ms,y:0},{x:ms,y:myY}],borderColor:'#818cf8',backgroundColor:'transparent',fill:false,pointRadius:[0,7],pointBackgroundColor:'#818cf8',borderWidth:2,tension:0,parsing:false},
      {label:'合格最低点',data:[{x:minPt,y:0},{x:minPt,y:minY}],borderColor:'#f87171',backgroundColor:'transparent',fill:false,pointRadius:[0,0],borderWidth:1.5,borderDash:[5,3],tension:0,parsing:false},
      {label:'合格者平均点',data:[{x:pap,y:0},{x:pap,y:papY}],borderColor:'#4ade80',backgroundColor:'transparent',fill:false,pointRadius:[0,0],borderWidth:1.5,borderDash:[5,3],tension:0,parsing:false}
    ]},
    plugins:[labelPlugin],
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:600},
      layout:{padding:{bottom:32}},
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{
        x:{type:'linear',min:xMin,max:xMax,
          ticks:{color:'#4b5563',font:{size:11},maxTicksLimit:6,callback:v=>Math.round(v)+''},
          grid:{color:'rgba(99,102,241,.08)'},border:{color:'rgba(99,102,241,.15)'}},
        y:{ticks:{display:false},grid:{display:false},border:{display:false}}
      }
    }
  });
  document.getElementById('chartLegend').innerHTML=`<span><span class="legend-dot" style="background:rgba(255,80,60,.7)"></span>不合格者</span><span><span class="legend-dot" style="background:rgba(60,230,140,.6)"></span>合格者</span><span><span class="legend-dot" style="background:#818cf8;border-radius:50%"></span>自分の点数</span><span><span class="legend-dot" style="background:#f87171;"></span>合格最低点</span><span><span class="legend-dot" style="background:#4ade80;"></span>合格者平均点</span>`;
}
</script>
</body>
